<!DOCTYPE html>
<!--
  templates/login.html — Formulario de inicio de sesión
  Hereda el estilo visual gamer de style.css
-->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — GameVault</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <!-- Estilos propios -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="auth-body">

  <!-- Partículas de fondo decorativas -->
  <div class="auth-bg-decoration">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
    <div class="auth-orb auth-orb-3"></div>
  </div>

  <!-- ============================================================
       MENSAJES FLASH
  ============================================================ -->
  <div class="flash-container">
    {% with messages = get_flashed_messages(with_categories=True) %}
      {% if messages %}
        {% for categoria, mensaje in messages %}
          <div class="alert alert-{{ categoria }} alert-dismissible fade show alert-gamer" role="alert">
            {{ mensaje }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
  </div>

  <!-- ============================================================
       FORMULARIO DE LOGIN
  ============================================================ -->
  <div class="auth-container">
    <div class="auth-card">

      <!-- Logo / Volver al inicio -->
      <div class="text-center mb-4">
        <a href="{{ url_for('index') }}" class="brand-logo text-decoration-none">
          <i class="bi bi-controller me-2"></i>GameVault
        </a>
      </div>

      <!-- Título del formulario -->
      <h2 class="auth-title text-center mb-1">Iniciar Sesión</h2>
      <p class="auth-subtitle text-center mb-4">Accede a tu cuenta para comprar</p>

      <!-- -------------------------------------------------------
           FORMULARIO HTML
           action → URL donde se envían los datos (ruta /login de Flask)
           method → POST envía los datos de forma segura en el cuerpo HTTP
      ------------------------------------------------------- -->
      <form action="{{ url_for('login') }}" method="POST" novalidate>

        <!-- Campo: Email -->
        <div class="mb-3">
          <label for="email" class="form-label auth-label">
            <i class="bi bi-envelope me-1"></i>Correo electrónico
          </label>
          <!-- name="email" → así request.form.get('email') lo lee en Flask -->
          <input
            type="email"
            id="email"
            name="email"
            class="form-control auth-input"
            placeholder="jugador@gamevault.com"
            required
            autocomplete="email"
          >
        </div>

        <!-- Campo: Contraseña -->
        <div class="mb-4">
          <label for="password" class="form-label auth-label">
            <i class="bi bi-lock me-1"></i>Contraseña
          </label>
          <!-- type="password" → oculta los caracteres al escribir -->
          <input
            type="password"
            id="password"
            name="password"
            class="form-control auth-input"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          >
        </div>

        <!-- Botón de envío del formulario -->
        <button type="submit" class="btn btn-neon w-100 btn-auth">
          <i class="bi bi-box-arrow-in-right me-2"></i>Entrar al Vault
        </button>

      </form><!-- /form -->

      <!-- Enlace a registro -->
      <p class="text-center mt-4 auth-switch">
        ¿Aún no tienes cuenta?
        <a href="{{ url_for('registro') }}" class="link-neon">Regístrate gratis</a>
      </p>

      <!-- Enlace para volver al inicio -->
      <p class="text-center mt-2">
        <a href="{{ url_for('index') }}" class="text-muted text-decoration-none small">
          <i class="bi bi-arrow-left me-1"></i>Volver al catálogo
        </a>
      </p>

    </div><!-- /auth-card -->
  </div><!-- /auth-container -->

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
